<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#a8edea,#fed6e3);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    padding:10px;
    box-sizing:border-box;
}
body {
    background-image: url('1.png');
    background-size: cover; /* Makes image cover the whole area */
    background-repeat: no-repeat; /* Prevents repeating */
    background-position: center; /* Centers the image */
}
.box{
    background:white;
    padding:30px;
    width:100%;
    max-width:350px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
}
button:hover{
    background:#45a049;
}
.back-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#f44336;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
.back-btn:hover{
    background:#d32f2f;
}
#message{
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    display:none;
    font-weight:bold;
}
.success{
    background:#d4edda;
    color:#155724;
    border:1px solid #c3e6cb;
}
.error{
    background:#f8d7da;
    color:#721c24;
    border:1px solid #f5c6cb;
}
@media screen and (max-width:480px){
    .box{padding:20px;}
    input, button{padding:10px; font-size:14px;}
    .back-btn{padding:8px 12px; font-size:14px;}
}
</style>
</head>
<body>

<div class="box">
<h2>Change Password</h2>

<input id="oldUsername" placeholder="Old Username">
<input id="oldPassword" type="password" placeholder="Old Password">
<input id="newPassword" type="password" placeholder="New Password">
<input id="confirmPassword" type="password" placeholder="Confirm New Password">

<button onclick="changePass()">Change Password</button>
<a href="index.html" class="back-btn">⬅ Back to Login</a>
<div id="message"></div>
</div>

<script>
function changePass(){
    let oldUsername = document.getElementById("oldUsername").value.trim();
    let oldPassword = document.getElementById("oldPassword").value.trim();
    let newPassword = document.getElementById("newPassword").value.trim();
    let confirmPassword = document.getElementById("confirmPassword").value.trim();
    if(!oldUsername || !oldPassword || !newPassword || !confirmPassword){
        showMessage("Please fill all fields!", "error");
        return;
    }
    if(newPassword !== confirmPassword){
        showMessage("New passwords do not match!", "error");
        return;
    }
    let users = JSON.parse(localStorage.getItem("users"))||[];
    let userFound = false;
    users.forEach(u=>{
        if(u.username === oldUsername && u.password === oldPassword){
            u.password = newPassword;
            userFound = true;
        }
    });
    if(!userFound){
        showMessage("Old username or password is incorrect!", "error");
        return;
    }
    localStorage.setItem("users", JSON.stringify(users));
    showMessage("✅ Password updated successfully!", "success");
    setTimeout(()=>{ window.location="index.html"; }, 2000);
}
function showMessage(msg, type){
    let messageDiv = document.getElementById("message");
    messageDiv.style.display = "block";
    messageDiv.className = type;
    messageDiv.innerText = msg;
}
</script>

</body>
</html>

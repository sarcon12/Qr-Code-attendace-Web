<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url('1.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.box {
    width: 100%;
    max-width: 380px;
    padding: 40px 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    text-align: center;
    color: #e21072;
}

h2 {
    font-size: 50px;
    margin-bottom: 25px;
    letter-spacing: 1px;
    color:  rgba(18, 205, 158, 0.8); /* Green accent */
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

input, select{
    width: 80%;
    padding: 12px 15px;
    margin: 12px 0;
    border: none;
    border-radius: 12px;
    outline: none;
    background: rgba(255,255,255,0.25);
    color: #e30d4d;
    font-size: 20px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}

input::placeholder {
    color: rgba(34,34,34,0.7);
}

.password-container {
    position: relative;
}

.password-container input {
    padding-right: 50px;
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 14px;
    color: #222;
    user-select: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: rgba(18, 205, 158, 0.8); /* Green button */
    color: whitesmoke;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 12px rgba(76,175,80,0.4);
}

button:hover {
    background: rgba(18, 205, 158, 0.8); /* Brighter green on hover */
}

a {
    display: block;
    margin-top: 12px;
    color: #e30d4d; /* Green links */
    text-decoration: none;
    font-size: 20px;
    transition: color 0.2s;
}

a:hover {
    color: #1411c0; /* Lighter green on hover */
}

@media screen and (max-width:400px){
    .box {
        padding: 30px 20px;
    }
    h2 {
        font-size: 24px;
    }
    button {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="box">

<h2>Welcome</h2>

<input id="username" placeholder="Username">

<div class="password-container">
    <input id="password" type="password" placeholder="Password">
    <span class="toggle-password" onclick="togglePassword()">Show</span>
</div>

<select id="role">
<option value="">Select Role</option>
<option value="admin">Admin</option>
<option value="student">Student</option>
</select>

<button onclick="login()">Login</button>

<a href="register_student.html">Register</a>
<a href="change_password.html">Change Password</a>

</div>

<script>
if(!localStorage.getItem("users")){
    let users=[{username:"admin",password:"admin123",role:"admin"}];
    localStorage.setItem("users",JSON.stringify(users));
}

function login(){
    let username=document.getElementById("username").value;
    let password=document.getElementById("password").value;
    let role=document.getElementById("role").value;

    if(!username || !password || !role){
        alert("Please fill all fields");
        return;
    }

    let users=JSON.parse(localStorage.getItem("users"));
    let user=users.find(u=>u.username===username && u.password===password && u.role===role);

    if(user){
        localStorage.setItem("currentUser",JSON.stringify(user));
        if(role==="admin"){
            window.location="admin_dashboard.html";
        }else{
            window.location="student_dashboard.html";
        }
    }else{
        alert("Invalid login");
    }
}

function togglePassword(){
    let passInput = document.getElementById("password");
    let toggle = document.querySelector(".toggle-password");
    if(passInput.type === "password"){
        passInput.type = "text";
        toggle.innerText = "Hide";
    }else{
        passInput.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family:Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#a8edea,#fed6e3);
    min-height:100vh;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    box-sizing:border-box;
}
body {
    background-image: url('1.png');
    background-size: cover; /* Makes image cover the whole area */
    background-repeat: no-repeat; /* Prevents repeating */
    background-position: center; /* Centers the image */
}
.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
    max-width:350px;
    width:100%;
}
h1{
    margin-bottom:5px;
    color:#333;
}
p{
    color:#555;
    margin-bottom:20px;
    font-size:16px;
}
#qr{
    margin-bottom:20px;
    border:5px solid #4CAF50;
    border-radius:10px;
    max-width:100%;
    height:auto;
}
.info{
    background:#f0f0f0;
    padding:15px;
    border-radius:10px;
    text-align:left;
    display:none;
}
.info p{
    margin:5px 0;
}
.back-btn{
    margin-top:20px;
    display:inline-block;
    padding:10px 15px;
    background:#f44336;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
.back-btn:hover{
    background:#d32f2f;
}
@media screen and (max-width:480px){
    .card{padding:20px;}
    h1{font-size:22px;}
    p{font-size:14px;}
    #qr{border-width:3px;}
}
</style>
</head>
<body>

<div class="card">
    <h1>Student QR Code</h1>
    <p>Your QR Attendance Code</p>
    <img id="qr" src="">

    <div class="info" id="studentInfo">
        <h3>Student Info</h3>
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Course:</strong> <span id="course"></span></p>
        <p><strong>Year:</strong> <span id="year"></span></p>
        <p><strong>Section:</strong> <span id="section"></span></p>
    </div>

    <a href="index.html" class="back-btn">⬅ Back to Login</a>
</div>

<script>
let user = JSON.parse(localStorage.getItem("currentUser"));
let students = JSON.parse(localStorage.getItem("students")) || [];

// Find the student object
let studentData = students.find(s => s.username === user.username);

if(studentData){
    // Show student info
    document.getElementById("studentInfo").style.display = "block";
    document.getElementById("name").innerText = studentData.name;
    document.getElementById("course").innerText = studentData.course;
    document.getElementById("year").innerText = studentData.year;
    document.getElementById("section").innerText = studentData.section;

    // Generate QR code using **username** as a unique identifier
    let qrText = studentData.username; 
    let qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(qrText);
    document.getElementById("qr").src = qrUrl;
} else {
    // Fallback if student not found
    alert("❌ Current student not found!");
}
</script>

</body>
</html>
